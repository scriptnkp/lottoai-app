<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LOTTOAI PRO - Member Edition</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Kanit', sans-serif; background: #f4f7f6; }
    .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid white; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.1); }
    [x-cloak] { display: none !important; }
  </style>
</head>
<body x-data="lottoApp()" x-init="initApp()" class="min-h-screen bg-slate-50">

  <div x-show="!isLoggedIn" class="fixed inset-0 z-[100] bg-emerald-600 flex items-center justify-center p-6">
    <div class="glass-card w-full max-w-sm p-8 rounded-[2.5rem] text-center">
      <div class="w-20 h-20 bg-white rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-xl text-emerald-600 font-black text-4xl">L</div>
      <h2 class="text-2xl font-black text-slate-800 mb-2" x-text="authMode === 'login' ? 'เข้าสู่ระบบ' : 'สมัครสมาชิก'"></h2>
      <p class="text-sm text-slate-500 mb-8">เพื่อเข้าใช้งานระบบวิเคราะห์ส่วนบุคคล</p>
      
      <div class="space-y-4 text-left">
        <div>
          <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">ชื่อผู้ใช้</label>
          <input type="text" x-model="authData.username" class="w-full p-4 rounded-2xl bg-slate-100 border-0 outline-none focus:ring-2 focus:ring-emerald-500 transition-all font-bold">
        </div>
        <div>
          <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">รหัสผ่าน</label>
          <input type="password" x-model="authData.password" class="w-full p-4 rounded-2xl bg-slate-100 border-0 outline-none focus:ring-2 focus:ring-emerald-500 transition-all font-bold">
        </div>
      </div>

      <button @click="handleAuth()" :disabled="loading" class="w-full mt-8 bg-slate-800 text-white py-4 rounded-2xl font-bold shadow-lg hover:bg-slate-700 transition-all active:scale-95 disabled:opacity-50">
        <span x-show="!loading" x-text="authMode === 'login' ? 'เข้าสู่ระบบ' : 'สมัครสมาชิกใหม่'"></span>
        <span x-show="loading">กำลังประมวลผล...</span>
      </button>

      <p @click="authMode = authMode === 'login' ? 'register' : 'login'" class="mt-6 text-sm text-emerald-700 font-bold cursor-pointer hover:underline" x-text="authMode === 'login' ? 'ยังไม่มีบัญชี? สมัครสมาชิก' : 'มีบัญชีแล้ว? เข้าสู่ระบบ'"></p>
    </div>
  </div>

  <div x-show="isLoggedIn" x-cloak class="flex flex-col min-h-screen">
    <header class="bg-white border-b p-4 flex justify-between items-center sticky top-0 z-40">
      <div class="flex items-center gap-3">
        <button @click="isMenuOpen = true" class="p-2 bg-slate-50 rounded-xl border"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg></button>
        <h1 class="text-xl font-black text-slate-800" x-text="tab"></h1>
      </div>
      <div class="flex flex-col items-end">
        <span class="text-[10px] font-bold text-slate-400 uppercase">ผู้ใช้</span>
        <span class="text-sm font-black text-emerald-600" x-text="username"></span>
      </div>
    </header>

    <div x-show="isMenuOpen" class="fixed inset-0 z-50 flex">
      <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" @click="isMenuOpen = false"></div>
      <div class="relative w-72 bg-white h-full p-6 shadow-2xl flex flex-col">
        <h2 class="text-2xl font-black text-emerald-600 mb-8">LOTTOAI MENU</h2>
        <nav class="flex-1 space-y-2">
          <template x-for="m in ['สถิติ', 'วิเคราะห์', 'ตรวจสลาก', 'ประวัติ']">
            <button @click="tab = m; isMenuOpen = false" :class="tab === m ? 'bg-emerald-500 text-white' : 'hover:bg-slate-50 text-slate-600'" class="w-full text-left px-5 py-3.5 rounded-2xl font-bold transition-all" x-text="m"></button>
          </template>
        </nav>
        <button @click="logout()" class="mt-auto w-full bg-rose-50 text-rose-600 py-4 rounded-2xl font-bold border border-rose-100">ออกจากระบบ</button>
      </div>
    </div>

    <main class="p-4 flex-1">
      <div x-show="tab === 'วิเคราะห์'">
         <div class="glass-card p-8 rounded-[2.5rem] text-center">
            <p class="text-xs font-bold text-slate-400 mb-4 uppercase">ยินดีต้อนรับคุณ <span x-text="username"></span></p>
            <input type="number" x-model="form.inputNumbers" placeholder="ระบุเลขงวดล่าสุด" class="w-full text-center text-4xl font-black bg-transparent outline-none mb-6">
            <button @click="analyze()" class="w-full bg-emerald-500 text-white py-4 rounded-2xl font-bold shadow-lg">🎯 เริ่มวิเคราะห์ของฉัน</button>
         </div>
         <div x-show="result" class="mt-6 p-6 bg-white rounded-[2rem] border-2 border-emerald-100">
            <p class="text-xs font-bold text-emerald-600 mb-4">เลขเด่นที่คุณวิเคราะห์ได้:</p>
            <div class="flex justify-around text-3xl font-black text-slate-800">
               <template x-for="n in result?.prediction"><span x-text="n"></span></template>
            </div>
         </div>
      </div>

      <div x-show="tab === 'ประวัติ'">
        <div class="flex justify-between items-center mb-4">
          <h3 class="font-black text-lg">ประวัติของคุณ</h3>
          <button @click="fetchHistory()" class="text-xs text-blue-500">🔄 รีเฟรช</button>
        </div>
        <div class="space-y-3">
          <template x-for="h in history">
            <div class="bg-white p-4 rounded-2xl border flex justify-between items-center">
              <div><p class="text-[10px] text-slate-400" x-text="h.time"></p><p class="font-bold text-slate-700" x-text="h.type"></p></div>
              <div class="text-xl font-black text-emerald-600" x-text="h.result"></div>
            </div>
          </template>
        </div>
      </div>

      </main>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzphIfLGfk0EBeGpaMLkGwY1oM4-lxOoH0mZjckg7I7xg9KkSN_FLVFU6U3MixTNlW2/exec";

    function lottoApp() {
      return {
        tab: 'วิเคราะห์',
        isLoggedIn: false,
        username: '',
        authMode: 'login',
        loading: false,
        isMenuOpen: false,
        authData: { username: '', password: '' },
        form: { inputNumbers: '', lotteryType: 'รัฐบาลไทย', engineMode: 'A', numStates: {} },
        result: null,
        history: [],

        initApp() {
          const savedUser = localStorage.getItem('lottoUser');
          if (savedUser) {
            this.username = savedUser;
            this.isLoggedIn = true;
            this.fetchHistory();
          }
        },

        async handleAuth() {
          if(!this.authData.username || !this.authData.password) return alert('กรุณากรอกข้อมูลให้ครบ');
          this.loading = true;
          try {
            const res = await fetch(API_URL, {
              method: 'POST',
              body: JSON.stringify({ action: this.authMode, data: this.authData })
            });
            const data = await res.json();
            if(data.status === 'success') {
              if(this.authMode === 'login') {
                this.username = data.username;
                this.isLoggedIn = true;
                localStorage.setItem('lottoUser', data.username);
                this.fetchHistory();
              } else {
                alert('สมัครสมาชิกสำเร็จ กรุณาเข้าสู่ระบบ');
                this.authMode = 'login';
              }
            } else {
              alert(data.message);
            }
          } catch(e) { alert('การเชื่อมต่อล้มเหลว'); }
          this.loading = false;
        },

        logout() {
          localStorage.removeItem('lottoUser');
          location.reload();
        },

        async analyze() {
          this.loading = true;
          try {
            const res = await fetch(API_URL, {
              method: 'POST',
              body: JSON.stringify({ action: 'analyze', data: this.form, username: this.username })
            });
            this.result = await res.json();
            this.fetchHistory();
          } catch(e) {}
          this.loading = false;
        },

        async fetchHistory() {
          try {
            const res = await fetch(`${API_URL}?action=getHistory&username=${this.username}`);
            this.history = await res.json();
          } catch(e) {}
        }
      }
    }
  </script>
</body>
</html>
